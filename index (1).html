<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Gym Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        .app-container {
            max-width: 428px;
            margin: 0 auto;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2a2a3e;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .header .subtitle {
            color: #888;
            font-size: 14px;
        }

        .workout-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .workout-chip {
            padding: 10px 20px;
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .workout-chip.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .workout-chip.add {
            border-style: dashed;
            color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .exercise-card {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            position: relative;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .exercise-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }

        .exercise-total {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-right: 10px;
        }

        .delete-exercise-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .sets-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 60px;
            gap: 10px;
            align-items: center;
        }

        .set-number {
            color: #888;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.6);
        }

        .check-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .check-btn.completed {
            background: #667eea;
            color: white;
        }

        .add-exercise-btn {
            width: 100%;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border: 2px dashed rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .timer-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .timer-modal.active {
            display: flex;
        }

        .timer-content {
            text-align: center;
            padding: 40px;
        }

        .timer-display {
            font-size: 80px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .timer-btn {
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .timer-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .timer-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .exercise-list-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exercise-list-name {
            color: #fff;
            font-weight: 500;
        }

        .exercise-list-sets {
            color: #888;
            font-size: 14px;
        }

        .history-item {
            background: rgba(26, 26, 46, 0.6);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .history-date {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .history-workout-name {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .history-exercises {
            display: grid;
            gap: 8px;
        }

        .history-exercise {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #ccc;
        }

        .save-btn {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .save-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .settings-section {
            background: rgba(26, 26, 46, 0.6);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .settings-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #667eea;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-label {
            color: #fff;
            font-size: 16px;
        }

        .settings-value {
            color: #888;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            padding: 8px 12px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 6px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
        }

        .danger-btn {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1 onclick="openWorkoutManager()">💪 GYM TRACKER</h1>
            <div class="subtitle" id="currentDate"></div>
        </div>

        <div class="workout-selector" id="workoutSelector"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('workout')">Workout</button>
            <button class="tab" onclick="switchTab('history')">History</button>
            <button class="tab" onclick="switchTab('settings')">Settings</button>
        </div>

        <div id="workoutTab" class="tab-content active">
            <div id="exercisesContainer"></div>
            <button class="add-exercise-btn" onclick="openAddExercise()">+ Add Exercise</button>
        </div>

        <div id="historyTab" class="tab-content">
            <div id="historyContainer"></div>
        </div>

        <div id="settingsTab" class="tab-content">
            <div class="settings-section">
                <div class="settings-title">Workouts</div>
                <div id="workoutsList"></div>
            </div>
            
            <div class="settings-section">
                <div class="settings-title">Data</div>
                <div class="settings-item">
                    <div class="settings-label">Export Data</div>
                    <button class="icon-btn" onclick="exportData()">📥 Download</button>
                </div>
                <div class="settings-item">
                    <div class="settings-label">Import Data</div>
                    <button class="icon-btn" onclick="document.getElementById('importFile').click()">📤 Upload</button>
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
                </div>
                <div class="settings-item">
                    <div class="settings-label">Clear All Data</div>
                    <button class="icon-btn danger-btn" onclick="clearAllData()">🗑️ Delete</button>
                </div>
            </div>
        </div>

        <button class="save-btn" onclick="saveWorkout()">Save Workout</button>
    </div>

    <!-- Timer Modal -->
    <div class="timer-modal" id="timerModal">
        <div class="timer-content">
            <div class="timer-display" id="timerDisplay">90</div>
            <div class="timer-controls">
                <button class="timer-btn secondary" onclick="skipTimer()">Skip</button>
                <button class="timer-btn primary" id="timerActionBtn" onclick="toggleTimer()">Pause</button>
            </div>
        </div>
    </div>

    <!-- Workout Manager Modal -->
    <div class="modal-overlay" id="workoutManagerModal">
        <div class="modal">
            <div class="modal-title">Manage Workouts</div>
            <div id="manageWorkoutsList"></div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeWorkoutManager()">Close</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Workout Modal -->
    <div class="modal-overlay" id="workoutModal">
        <div class="modal">
            <div class="modal-title" id="workoutModalTitle">New Workout</div>
            <input type="text" id="workoutNameInput" class="modal-input" placeholder="Workout name (e.g., Push, Pull, Legs)">
            <input type="text" id="workoutEmojiInput" class="modal-input" placeholder="Emoji (optional)" maxlength="2">
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeWorkoutModal()">Cancel</button>
                <button class="modal-btn primary" onclick="saveWorkoutType()">Save</button>
            </div>
        </div>
    </div>

    <!-- Add Exercise Modal -->
    <div class="modal-overlay" id="addExerciseModal">
        <div class="modal">
            <div class="modal-title">Add Exercise</div>
            <input type="text" id="exerciseNameInput" class="modal-input" placeholder="Exercise name">
            <input type="number" id="exerciseSetsInput" class="modal-input" placeholder="Number of sets" value="3" min="1" max="10">
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeAddExercise()">Cancel</button>
                <button class="modal-btn primary" onclick="addExercise()">Add</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_WORKOUTS = {
            'push': {
                name: 'Push',
                emoji: '💪',
                exercises: [
                    { name: 'Bench Press', sets: 3 },
                    { name: 'Incline Dumbbell Press', sets: 3 },
                    { name: 'Shoulder Press', sets: 3 },
                    { name: 'Lateral Raises', sets: 3 },
                    { name: 'Tricep Pushdowns', sets: 3 },
                    { name: 'Overhead Tricep Extension', sets: 3 }
                ]
            }
        };

        const REST_TIME = 90;

        let workoutTypes = {};
        let currentWorkoutId = 'push';
        let currentWorkout = {};
        let timerInterval = null;
        let timeRemaining = REST_TIME;
        let timerRunning = false;
        let editingWorkoutId = null;

        // Initialize
        function init() {
            loadWorkoutTypes();
            updateDate();
            loadCurrentWorkout();
            renderWorkoutSelector();
            renderExercises();
            renderHistory();
            renderSettings();
        }

        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-GB', options);
        }

        function loadWorkoutTypes() {
            const stored = localStorage.getItem('workoutTypes');
            if (stored) {
                workoutTypes = JSON.parse(stored);
            } else {
                workoutTypes = DEFAULT_WORKOUTS;
                saveWorkoutTypes();
            }
        }

        function saveWorkoutTypes() {
            localStorage.setItem('workoutTypes', JSON.stringify(workoutTypes));
        }

        function loadCurrentWorkout() {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            const lastWorkoutOfType = history.find(w => w.workoutId === currentWorkoutId);
            
            const workout = workoutTypes[currentWorkoutId];
            if (!workout) return;

            currentWorkout = {};
            workout.exercises.forEach(ex => {
                const exerciseName = ex.name;
                if (lastWorkoutOfType && lastWorkoutOfType.workout[exerciseName]) {
                    currentWorkout[exerciseName] = JSON.parse(JSON.stringify(lastWorkoutOfType.workout[exerciseName]));
                } else {
                    currentWorkout[exerciseName] = Array(ex.sets).fill().map(() => ({
                        weight: '',
                        reps: '',
                        completed: false
                    }));
                }
            });
        }

        function renderWorkoutSelector() {
            const container = document.getElementById('workoutSelector');
            container.innerHTML = '';

            Object.keys(workoutTypes).forEach(id => {
                const workout = workoutTypes[id];
                const chip = document.createElement('div');
                chip.className = 'workout-chip' + (id === currentWorkoutId ? ' active' : '');
                chip.textContent = `${workout.emoji || '💪'} ${workout.name}`;
                chip.onclick = () => selectWorkout(id);
                container.appendChild(chip);
            });

            const addChip = document.createElement('div');
            addChip.className = 'workout-chip add';
            addChip.textContent = '+ New Workout';
            addChip.onclick = openWorkoutModal;
            container.appendChild(addChip);
        }

        function selectWorkout(id) {
            currentWorkoutId = id;
            loadCurrentWorkout();
            renderWorkoutSelector();
            renderExercises();
        }

        function openWorkoutModal(editId = null) {
            editingWorkoutId = editId;
            const modal = document.getElementById('workoutModal');
            
            if (editId) {
                const workout = workoutTypes[editId];
                document.getElementById('workoutModalTitle').textContent = 'Edit Workout';
                document.getElementById('workoutNameInput').value = workout.name;
                document.getElementById('workoutEmojiInput').value = workout.emoji || '';
            } else {
                document.getElementById('workoutModalTitle').textContent = 'New Workout';
                document.getElementById('workoutNameInput').value = '';
                document.getElementById('workoutEmojiInput').value = '';
            }
            
            modal.classList.add('active');
        }

        function closeWorkoutModal() {
            document.getElementById('workoutModal').classList.remove('active');
            editingWorkoutId = null;
        }

        function saveWorkoutType() {
            const name = document.getElementById('workoutNameInput').value.trim();
            const emoji = document.getElementById('workoutEmojiInput').value.trim();
            
            if (!name) {
                alert('Please enter a workout name');
                return;
            }

            const id = editingWorkoutId || name.toLowerCase().replace(/\s+/g, '-');
            
            if (!editingWorkoutId && workoutTypes[id]) {
                alert('A workout with this name already exists');
                return;
            }

            if (editingWorkoutId) {
                workoutTypes[id].name = name;
                workoutTypes[id].emoji = emoji;
            } else {
                workoutTypes[id] = {
                    name: name,
                    emoji: emoji,
                    exercises: []
                };
                currentWorkoutId = id;
            }

            saveWorkoutTypes();
            loadCurrentWorkout();
            renderWorkoutSelector();
            renderExercises();
            renderSettings();
            closeWorkoutModal();
        }

        function deleteWorkout(id) {
            if (Object.keys(workoutTypes).length === 1) {
                alert('You must have at least one workout');
                return;
            }

            if (confirm(`Delete "${workoutTypes[id].name}" workout?`)) {
                delete workoutTypes[id];
                saveWorkoutTypes();
                
                if (currentWorkoutId === id) {
                    currentWorkoutId = Object.keys(workoutTypes)[0];
                    loadCurrentWorkout();
                }
                
                renderWorkoutSelector();
                renderExercises();
                renderSettings();
            }
        }

        function openWorkoutManager() {
            renderManageWorkouts();
            document.getElementById('workoutManagerModal').classList.add('active');
        }

        function closeWorkoutManager() {
            document.getElementById('workoutManagerModal').classList.remove('active');
        }

        function renderManageWorkouts() {
            const container = document.getElementById('manageWorkoutsList');
            container.innerHTML = '';

            Object.keys(workoutTypes).forEach(id => {
                const workout = workoutTypes[id];
                const item = document.createElement('div');
                item.className = 'exercise-list-item';
                item.innerHTML = `
                    <div>
                        <div class="exercise-list-name">${workout.emoji || '💪'} ${workout.name}</div>
                        <div class="exercise-list-sets">${workout.exercises.length} exercises</div>
                    </div>
                    <div class="btn-group">
                        <button class="icon-btn" onclick="openWorkoutModal('${id}')">✏️</button>
                        <button class="icon-btn danger-btn" onclick="deleteWorkout('${id}')">🗑️</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderExercises() {
            const container = document.getElementById('exercisesContainer');
            container.innerHTML = '';

            const workout = workoutTypes[currentWorkoutId];
            if (!workout || !workout.exercises.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏋️</div>
                        <div>No exercises yet.<br>Add your first exercise!</div>
                    </div>
                `;
                return;
            }

            workout.exercises.forEach(exercise => {
                const sets = currentWorkout[exercise.name] || [];
                const totalVolume = sets.reduce((sum, set) => {
                    return sum + (parseFloat(set.weight) || 0) * (parseInt(set.reps) || 0);
                }, 0);

                const card = document.createElement('div');
                card.className = 'exercise-card';
                card.innerHTML = `
                    <div class="exercise-header">
                        <div class="exercise-name">${exercise.name}</div>
                        <div class="exercise-total">${totalVolume > 0 ? totalVolume + ' kg total' : ''}</div>
                        <button class="delete-exercise-btn" onclick="deleteExercise('${exercise.name}')">✕</button>
                    </div>
                    <div class="sets-container">
                        ${sets.map((set, index) => `
                            <div class="set-row">
                                <div class="set-number">Set ${index + 1}</div>
                                <div class="input-group">
                                    <label class="input-label">Weight (kg)</label>
                                    <input 
                                        type="number" 
                                        class="input-field" 
                                        value="${set.weight}"
                                        onchange="updateSet('${exercise.name}', ${index}, 'weight', this.value)"
                                        step="0.5"
                                        inputmode="decimal"
                                    >
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Reps</label>
                                    <input 
                                        type="number" 
                                        class="input-field" 
                                        value="${set.reps}"
                                        onchange="updateSet('${exercise.name}', ${index}, 'reps', this.value)"
                                        inputmode="numeric"
                                    >
                                </div>
                                <button 
                                    class="check-btn ${set.completed ? 'completed' : ''}"
                                    onclick="toggleSetComplete('${exercise.name}', ${index})"
                                >
                                    ${set.completed ? '✓' : ''}
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openAddExercise() {
            document.getElementById('exerciseNameInput').value = '';
            document.getElementById('exerciseSetsInput').value = '3';
            document.getElementById('addExerciseModal').classList.add('active');
        }

        function closeAddExercise() {
            document.getElementById('addExerciseModal').classList.remove('active');
        }

        function addExercise() {
            const name = document.getElementById('exerciseNameInput').value.trim();
            const sets = parseInt(document.getElementById('exerciseSetsInput').value) || 3;

            if (!name) {
                alert('Please enter an exercise name');
                return;
            }

            const workout = workoutTypes[currentWorkoutId];
            if (workout.exercises.some(ex => ex.name === name)) {
                alert('This exercise already exists in this workout');
                return;
            }

            workout.exercises.push({ name, sets });
            currentWorkout[name] = Array(sets).fill().map(() => ({
                weight: '',
                reps: '',
                completed: false
            }));

            saveWorkoutTypes();
            renderExercises();
            closeAddExercise();
        }

        function deleteExercise(name) {
            if (confirm(`Remove "${name}" from this workout?`)) {
                const workout = workoutTypes[currentWorkoutId];
                workout.exercises = workout.exercises.filter(ex => ex.name !== name);
                delete currentWorkout[name];
                saveWorkoutTypes();
                renderExercises();
            }
        }

        function updateSet(exercise, setIndex, field, value) {
            currentWorkout[exercise][setIndex][field] = value;
            renderExercises();
        }

        function toggleSetComplete(exercise, setIndex) {
            const set = currentWorkout[exercise][setIndex];
            set.completed = !set.completed;
            
            if (set.completed && set.weight && set.reps) {
                startTimer();
            }
            
            renderExercises();
        }

        function startTimer() {
            timeRemaining = REST_TIME;
            timerRunning = true;
            document.getElementById('timerModal').classList.add('active');
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (timerRunning) {
                    timeRemaining--;
                    updateTimerDisplay();
                    
                    if (timeRemaining <= 0) {
                        playSound();
                        skipTimer();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timerDisplay').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            timerRunning = !timerRunning;
            document.getElementById('timerActionBtn').textContent = timerRunning ? 'Pause' : 'Resume';
        }

        function skipTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('timerModal').classList.remove('active');
            document.getElementById('timerActionBtn').textContent = 'Pause';
        }

        function playSound() {
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }
        }

        function saveWorkout() {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            
            const newEntry = {
                date: new Date().toISOString(),
                workoutId: currentWorkoutId,
                workoutName: workoutTypes[currentWorkoutId].name,
                workout: JSON.parse(JSON.stringify(currentWorkout))
            };
            
            history.unshift(newEntry);
            
            if (history.length > 100) {
                history.pop();
            }
            
            localStorage.setItem('workoutHistory', JSON.stringify(history));
            
            alert('Workout saved! 💪');
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div>No workout history yet.<br>Complete your first session!</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = history.map(entry => {
                const date = new Date(entry.date);
                const dateStr = date.toLocaleDateString('en-GB', { 
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric',
                    year: 'numeric'
                });

                const workout = workoutTypes[entry.workoutId];
                const exercises = workout ? workout.exercises : Object.keys(entry.workout).map(name => ({ name }));
                
                return `
                    <div class="history-item">
                        <div class="history-date">${dateStr}</div>
                        <div class="history-workout-name">${entry.workoutName}</div>
                        <div class="history-exercises">
                            ${exercises.map(exercise => {
                                const sets = entry.workout[exercise.name] || [];
                                const completedSets = sets.filter(s => s.completed).length;
                                const totalVolume = sets.reduce((sum, set) => {
                                    return sum + (parseFloat(set.weight) || 0) * (parseInt(set.reps) || 0);
                                }, 0);
                                
                                return `
                                    <div class="history-exercise">
                                        <span>${exercise.name}</span>
                                        <span>${completedSets} sets • ${totalVolume} kg</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSettings() {
            const container = document.getElementById('workoutsList');
            container.innerHTML = '';

            Object.keys(workoutTypes).forEach(id => {
                const workout = workoutTypes[id];
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <div>
                        <div class="settings-label">${workout.emoji || '💪'} ${workout.name}</div>
                        <div class="settings-value">${workout.exercises.length} exercises</div>
                    </div>
                    <div class="btn-group">
                        <button class="icon-btn" onclick="openWorkoutModal('${id}')">Edit</button>
                        <button class="icon-btn danger-btn" onclick="deleteWorkout('${id}')">Delete</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function exportData() {
            const data = {
                workoutTypes: workoutTypes,
                history: JSON.parse(localStorage.getItem('workoutHistory') || '[]'),
                exportDate: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gym-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (confirm('This will replace all your current data. Continue?')) {
                        if (data.workoutTypes) {
                            localStorage.setItem('workoutTypes', JSON.stringify(data.workoutTypes));
                            workoutTypes = data.workoutTypes;
                        }
                        if (data.history) {
                            localStorage.setItem('workoutHistory', JSON.stringify(data.history));
                        }
                        
                        currentWorkoutId = Object.keys(workoutTypes)[0];
                        loadCurrentWorkout();
                        renderWorkoutSelector();
                        renderExercises();
                        renderHistory();
                        renderSettings();
                        
                        alert('Data imported successfully!');
                    }
                } catch (error) {
                    alert('Invalid backup file');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function clearAllData() {
            if (confirm('This will delete ALL workouts and history. This cannot be undone!')) {
                if (confirm('Are you absolutely sure?')) {
                    localStorage.clear();
                    workoutTypes = DEFAULT_WORKOUTS;
                    currentWorkoutId = 'push';
                    saveWorkoutTypes();
                    loadCurrentWorkout();
                    renderWorkoutSelector();
                    renderExercises();
                    renderHistory();
                    renderSettings();
                    alert('All data cleared');
                }
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'workout') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('workoutTab').classList.add('active');
            } else if (tab === 'history') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('historyTab').classList.add('active');
            } else if (tab === 'settings') {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('settingsTab').classList.add('active');
            }
        }

        // Initialize app
        init();
    </script>
</body>
</html>

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Write service account JSON
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | sed 's/\\n/\n/g' > $HOME/serviceAccount.json
     

      - name: Authenticate with Firebase
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/serviceAccount.json"
          firebase --version

      - name: Validate service account JSON exists
        run: |
          if [ -s "$HOME/serviceAccount.json" ]; then
            echo "Service account JSON loaded successfully."
          else
            echo "Service account JSON is EMPTY or missing."
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        run: |
          cd $GITHUB_WORKSPACE
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/serviceAccount.json"
          firebase deploy --only hosting --project pj-gym-90c42

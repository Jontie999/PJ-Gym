name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase (Service Account)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/serviceAccount.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/serviceAccount.json
          firebase projects:list

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project pj-gym-90c42

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Gym Tracker v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        .app-container {
            max-width: 428px;
            margin: 0 auto;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2a2a3e;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .header .subtitle {
            color: #888;
            font-size: 14px;
        }

        .sync-status {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            font-size: 12px;
            color: #667eea;
        }

        .sync-status.syncing {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.2);
        }

        .sync-status.error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.2);
        }

        .auth-container {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin: 50px auto;
            max-width: 400px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .auth-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-toggle {
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
        }

        .workout-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .workout-chip {
            padding: 10px 20px;
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .workout-chip.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .workout-chip.add {
            border-style: dashed;
            color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .exercise-card {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .exercise-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }

        .exercise-total {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-right: 10px;
        }

        .delete-exercise-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .sets-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 60px;
            gap: 10px;
            align-items: center;
        }

        .set-number {
            color: #888;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.6);
        }

        .check-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .check-btn.completed {
            background: #667eea;
            color: white;
        }

        .add-exercise-btn {
            width: 100%;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border: 2px dashed rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: #667eea;

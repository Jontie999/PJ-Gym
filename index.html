<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Tracker">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Track your workouts, monitor progress, and sync across devices.">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180x180.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192x192.png">
    <title>Gym Tracker 2.02</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        .app-container {
            max-width: 428px;
            margin: 0 auto;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2a2a3e;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .header .subtitle {
            color: #888;
            font-size: 14px;
        }

        .sync-status {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            font-size: 12px;
            color: #667eea;
        }

        .sync-status.syncing {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.2);
        }

        .sync-status.error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.2);
        }

        .auth-container {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-top: 50px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .auth-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-toggle {
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
        }

        .workout-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 5px 0;
        }

        .workout-chip {
            padding: 10px 20px;
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .workout-chip.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .workout-chip.add {
            border-style: dashed;
            color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .exercise-card {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .exercise-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }

        .exercise-total {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-right: 10px;
        }

        .delete-exercise-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .rest-time-badge {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #667eea;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            margin-right: 6px;
            white-space: nowrap;
        }

        .rest-time-badge:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .last-session {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .last-session-label {
            color: #667eea;
            font-weight: 600;
            white-space: nowrap;
        }

        .last-session-set {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.85);
            white-space: nowrap;
        }

        .last-session-set.completed {
            color: #222;
        }

        .last-session-set.incomplete {
            color: #555;
        }

        .sets-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 60px;
            gap: 10px;
            align-items: center;
        }

        .set-number {
            color: #888;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.6);
        }

        .check-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .check-btn.completed {
            background: #667eea;
            color: white;
        }

        .add-exercise-btn {
            width: 100%;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border: 2px dashed rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .timer-modal, .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .timer-modal.active, .modal-overlay.active {
            display: flex;
        }

        .timer-content {
            text-align: center;
            padding: 40px;
        }

        .timer-display {
            font-size: 80px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .timer-controls, .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .timer-btn, .modal-btn {
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .timer-btn.primary, .modal-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .timer-btn.secondary, .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
        }

        .exercise-list-item, .history-item {
            background: rgba(26, 26, 46, 0.6);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .exercise-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-date {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .history-workout-name {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .history-exercises {
            display: grid;
            gap: 8px;
        }

        .history-exercise {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #ccc;
        }

        .save-btn {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom));
            right: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            z-index: 100;
            transition: transform 0.2s;
        }

        .save-btn:active {
            transform: scale(0.95);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .charts-container {
            padding: 10px 0;
        }

        .chart-section {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .chart-section h3 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .chart-section canvas {
            max-height: 300px;
        }

        .exercise-select {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            color: #fff;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .settings-section {
            background: rgba(26, 26, 46, 0.6);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .settings-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #667eea;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            padding: 8px 12px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 6px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
        }

        .danger-btn {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .summary-card {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.25);
            border-radius: 10px;
            padding: 14px 12px;
        }

        .summary-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .summary-stat {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
        }

        .summary-value {
            color: #667eea;
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="authScreen" class="auth-container">
        <div class="auth-title">💪 Welcome to Gym Tracker 2.02</div>
        <div class="auth-subtitle">Sign in to sync your workouts across devices</div>
        
        <input type="email" id="emailInput" class="auth-input" placeholder="Email" autocomplete="email">
        <input type="password" id="passwordInput" class="auth-input" placeholder="Password" autocomplete="current-password">
        
        <button class="auth-btn" onclick="handleAuth()">
            <span id="authBtnText">Sign In</span>
        </button>
        
        <div class="auth-toggle" onclick="toggleAuthMode()">
            <span id="authToggleText">Don't have an account? Sign up</span>
        </div>
    </div>

    <div id="appScreen" class="app-container hidden">
        <div class="header">
            <h1 onclick="openWorkoutManager()">💪 GYM TRACKER</h1>
            <div class="subtitle" id="currentDate"></div>
            <div class="sync-status" id="syncStatus">☁️ Synced</div>
        </div>

        <div class="workout-selector" id="workoutSelector"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('workout')">Workout</button>
            <button class="tab" onclick="switchTab('history')">History</button>
            <button class="tab" onclick="switchTab('settings')">Settings</button>
            <button class="tab" onclick="switchTab('charts')">📊 Charts</button>
        </div>

        <div id="workoutTab" class="tab-content active">
            <div id="exercisesContainer"></div>
            <button class="add-exercise-btn" onclick="openAddExercise()">+ Add Exercise</button>
        </div>

        <div id="historyTab" class="tab-content">
            <div id="historyContainer"></div>
        </div>

        <div id="chartsTab" class="tab-content">
            <div class="charts-container">
                <div id="workoutSummaryContainer"></div>
                <div class="chart-section">
                    <h3>Workout Frequency</h3>
                    <canvas id="frequencyChart"></canvas>
                </div>
                <div class="chart-section">
                    <h3>Exercise Progress</h3>
                    <select id="exerciseSelect" onchange="updateExerciseChart()" class="exercise-select">
                        <option value="">Select Exercise...</option>
                    </select>
                    <canvas id="exerciseChart"></canvas>
                </div>
                <div class="chart-section">
                    <h3>Total Volume by Workout</h3>
                    <canvas id="volumeChart"></canvas>
                </div>
            </div>
        </div>


        <div id="settingsTab" class="tab-content">
            <div class="settings-section">
                <div class="settings-title">Workouts</div>
                <div id="workoutsList"></div>
            </div>
            
            <div class="settings-section">
                <div class="settings-title">Account</div>
                <div class="settings-item">
                    <div>
                        <div style="color: #fff; font-size: 16px;">Email</div>
                        <div style="color: #888; font-size: 14px;" id="userEmail"></div>
                    </div>
                    <button class="icon-btn danger-btn" onclick="handleLogout()">Sign Out</button>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-title">About</div>
                <div class="settings-item">
                    <div>
                        <div style="color: #fff; font-size: 16px;">Gym Tracker</div>
                        <div style="color: #888; font-size: 14px;" id="appVersionDisplay"></div>
                    </div>
                </div>
            </div>
        </div>
        <button class="save-btn" onclick="saveWorkout()">Save Workout</button>
    </div>

<div class="timer-modal" id="timerModal">
        <div class="timer-content">
            <div class="timer-display" id="timerDisplay">90</div>
            <div class="timer-controls">
                <button class="timer-btn secondary" onclick="skipTimer()">Skip</button>
                <button class="timer-btn primary" id="timerActionBtn" onclick="toggleTimer()">Pause</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="workoutManagerModal">
        <div class="modal">
            <div class="modal-title">Manage Workouts</div>
            <div id="manageWorkoutsList"></div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeWorkoutManager()">Close</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="workoutModal">
        <div class="modal">
            <div class="modal-title" id="workoutModalTitle">New Workout</div>
            <input type="text" id="workoutNameInput" class="modal-input" placeholder="Workout name (e.g., Push, Pull, Legs)" aria-label="Workout name">
            <input type="text" id="workoutEmojiInput" class="modal-input" placeholder="Emoji (optional)" maxlength="2" aria-label="Workout emoji">
            <input type="number" id="workoutRestTimeInput" class="modal-input" placeholder="Rest period (seconds)" value="90" min="10" max="600" aria-label="Rest period in seconds">
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeWorkoutModal()">Cancel</button>
                <button class="modal-btn primary" onclick="saveWorkoutType()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addExerciseModal">
        <div class="modal">
            <div class="modal-title" id="addExerciseModalTitle">Add Exercise</div>
            <input type="text" id="exerciseNameInput" class="modal-input" placeholder="Exercise name">
            <input type="number" id="exerciseSetsInput" class="modal-input" placeholder="Number of sets" value="3" min="1" max="10">
            <input type="number" id="exerciseRestTimeInput" class="modal-input" placeholder="Rest time (seconds, leave blank to use workout default)" min="10" max="600" aria-label="Rest time per set in seconds (optional)">
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeAddExercise()">Cancel</button>
                <button class="modal-btn primary" id="addExerciseSaveBtn" onclick="saveExercise()">Add</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, limit, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDUVo0BGNGk5mhb-NMPKf1FxdLSij7ssms",
            authDomain: "pj-gym-90c42.firebaseapp.com",
            projectId: "pj-gym-90c42",
            storageBucket: "pj-gym-90c42.firebasestorage.app",
            messagingSenderId: "1070541610883",
            appId: "1:1070541610883:web:a3d5c9107accf23396a0b6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseModules = {
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            onAuthStateChanged,
            signOut,
            collection,
            doc,
            setDoc,
            getDoc,
            getDocs,
            query,
            orderBy,
            limit,
            where
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('userEmail').textContent = user.email;
                window.showApp();
                window.init();
            } else {
                window.currentUser = null;
                window.showAuth();
            }
        });
    </script>

    <script>
        const DEFAULT_WORKOUTS = {
            'push': {
                name: 'Push',
                emoji: '💪',
                restTime: 90,
                exercises: [
                    { name: 'Bench Press', sets: 3, defaultWeight: '60', defaultReps: '8' },
                    { name: 'Incline Dumbbell Press', sets: 3, defaultWeight: '20', defaultReps: '10' },
                    { name: 'Shoulder Press', sets: 3, defaultWeight: '40', defaultReps: '8' },
                    { name: 'Lateral Raises', sets: 3, defaultWeight: '10', defaultReps: '12' },
                    { name: 'Tricep Pushdowns', sets: 3, defaultWeight: '25', defaultReps: '12' },
                    { name: 'Overhead Tricep Extension', sets: 3, defaultWeight: '20', defaultReps: '10' }
                ]
            },
            'pull': {

        async function loadWorkoutTypes() {
            try {
                const userId = window.currentUser.uid;
                const workoutTypesRef = window.firebaseModules.doc(window.firebaseDb, `users/${userId}/settings/workoutTypes`);
                const docSnap = await window.firebaseModules.getDoc(workoutTypesRef);
                
                if (docSnap.exists()) {
                    workoutTypes = docSnap.data().types;
                    // Ensure every workout type has an exercises array
                    Object.keys(workoutTypes).forEach(id => {
                        if (!workoutTypes[id].exercises) {
                            workoutTypes[id].exercises = DEFAULT_WORKOUTS[id] ? DEFAULT_WORKOUTS[id].exercises : [];
                        }
                        // Merge missing defaultWeight/defaultReps from DEFAULT_WORKOUTS for matching exercises
                        if (DEFAULT_WORKOUTS[id] && DEFAULT_WORKOUTS[id].exercises) {
                            const defExMap = new Map(DEFAULT_WORKOUTS[id].exercises.map(d => [d.name, d]));
                            workoutTypes[id].exercises.forEach(ex => {
                                const defEx = defExMap.get(ex.name);
                                if (defEx) {
                                    if (ex.defaultWeight === undefined) ex.defaultWeight = defEx.defaultWeight ?? '';
                                    if (ex.defaultReps === undefined) ex.defaultReps = defEx.defaultReps ?? '';
                                }
                            });
                        }
                    });
                    // Add any missing default workout types (e.g. pull/legs added after user first signed up)
                    let addedDefaults = false;
                    Object.keys(DEFAULT_WORKOUTS).forEach(id => {
                        if (!workoutTypes[id]) {
                            workoutTypes[id] = DEFAULT_WORKOUTS[id];
                            addedDefaults = true;
                        }
                    });
                    if (addedDefaults) {
                        await saveWorkoutTypes();
                    }
                } else {
                    workoutTypes = DEFAULT_WORKOUTS;
                    await saveWorkoutTypes();
                }

                // Validate: ensure at least one workout exists
                if (!workoutTypes || Object.keys(workoutTypes).length === 0) {
                    console.log('No workouts found, resetting to defaults');
                    workoutTypes = DEFAULT_WORKOUTS;
                    currentWorkoutId = 'push';
                    await saveWorkoutTypes();
                }

                // Validate: ensure currentWorkoutId exists in workoutTypes
                if (!workoutTypes[currentWorkoutId]) {
                    console.log('Current workout not found, switching to first available');
                    currentWorkoutId = Object.keys(workoutTypes)[0];
                }
            } catch (error) {
                console.error('Error loading workout types:', error);
                workoutTypes = DEFAULT_WORKOUTS;
                currentWorkoutId = 'push';
                try {
                    await saveWorkoutTypes();
                } catch (saveError) {
                    console.error('Error saving default workouts:', saveError);
                }
            }
        }


        async function loadCurrentWorkout() {
            try {
                const userId = window.currentUser.uid;
                const workout = workoutTypes[currentWorkoutId];
                
                lastSessionData = null;
                
                if (!workout || !workout.exercises) {
                    currentWorkout = {};
                    return;
                }
                
                const workoutsRef = window.firebaseModules.collection(window.firebaseDb, `users/${userId}/workouts`);
                // Fetch the last 500 workouts ordered by date descending and filter
                // client-side for the current workout type.  500 is large enough that
                // a user would need to skip a given workout type for 500+ consecutive
                // sessions before the pre-fill could miss their last entry.
                const q = window.firebaseModules.query(
                    workoutsRef,
                    window.firebaseModules.orderBy('date', 'desc'),
                    window.firebaseModules.limit(500)
                );
                
                const querySnapshot = await window.firebaseModules.getDocs(q);
                currentWorkout = {};

                let lastWorkoutData = null;
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    if (!lastWorkoutData && data.workoutId === currentWorkoutId) {
                        lastWorkoutData = data;
                    }
                });
                
                lastSessionData = lastWorkoutData;
                
                if (lastWorkoutData) {
                    workout.exercises.forEach(ex => {
                        const prevSets = lastWorkoutData.workout && lastWorkoutData.workout[ex.name];
                        if (prevSets && prevSets.length > 0) {
                            const newSets = [];
                            for (let i = 0; i < ex.sets; i++) {
                                if (i < prevSets.length) {
                                    newSets.push({ weight: prevSets[i].weight, reps: prevSets[i].reps, completed: false });
                                } else {
                                    // Pad extra sets with last known weight/reps
                                    const lastSet = prevSets[prevSets.length - 1];
                                    newSets.push({ weight: lastSet.weight, reps: lastSet.reps, completed: false });
                                }
                            }
                            currentWorkout[ex.name] = newSets;
                        } else {
                            currentWorkout[ex.name] = Array(ex.sets).fill().map(() => ({
                                weight: ex.defaultWeight || '', reps: ex.defaultReps || '', completed: false
                            }));
                        }
                    });
                } else {
                    workout.exercises.forEach(ex => {
                        currentWorkout[ex.name] = Array(ex.sets).fill().map(() => ({
                            weight: ex.defaultWeight || '', reps: ex.defaultReps || '', completed: false
                        }));
                    });
                }
                
                updateSyncStatus('', '☁️ Synced');
            } catch (error) {
                console.error('Error loading workout:', error);
                updateSyncStatus('error', '⚠️ Error');
                // Ensure exercises are still visible with empty sets when loading fails
                const workout = workoutTypes[currentWorkoutId];
                if (workout && workout.exercises) {
                    workout.exercises.forEach(ex => {
                        if (!currentWorkout[ex.name]) {
                            currentWorkout[ex.name] = Array(ex.sets).fill().map(() => ({
                                weight: '', reps: '', completed: false
                            }));
                        }
                    });
                }
            }
        }

                await window.firebaseModules.setDoc(workoutTypesRef, { types: workoutTypes });
            } catch (error) {

            }

        async function saveWorkoutType() {
            const name = document.getElementById('workoutNameInput').value.trim();
            const emoji = document.getElementById('workoutEmojiInput').value.trim();
            const restTime = Math.min(600, Math.max(10, parseInt(document.getElementById('workoutRestTimeInput').value) || REST_TIME));
            
            if (!name) {
                alert('Please enter a workout name');
                return;
            }

            const id = editingWorkoutId || name.toLowerCase().replace(/\s+/g, '-');
            
            if (!editingWorkoutId && workoutTypes[id]) {
                alert('A workout with this name already exists');
                return;
            }

            if (editingWorkoutId) {
                workoutTypes[id].name = name;
                workoutTypes[id].emoji = emoji;
                workoutTypes[id].restTime = restTime;
            } else {
                workoutTypes[id] = { name, emoji, restTime, exercises: [] };
                currentWorkoutId = id;
            }

            await saveWorkoutTypes();
            await loadCurrentWorkout();
            renderWorkoutSelector();
            renderExercises();
            renderSettings();
            closeWorkoutModal();
        }

        async function deleteWorkout(id) {
            if (Object.keys(workoutTypes).length === 1) {
                alert('You must have at least one workout');
                return;
            }

            if (confirm(`Delete "${workoutTypes[id].name}" workout?`)) {
                delete workoutTypes[id];
                await saveWorkoutTypes();
                
                if (currentWorkoutId === id) {
                    currentWorkoutId = Object.keys(workoutTypes)[0];
                    await loadCurrentWorkout();
                }
                
                renderWorkoutSelector();
                renderExercises();
                renderSettings();
            }
        }

        async function moveWorkout(id, direction) {
            const keys = Object.keys(workoutTypes);
            const idx = keys.indexOf(id);
            const newIdx = direction === 'up' ? idx - 1 : idx + 1;
            if (newIdx < 0 || newIdx >= keys.length) return;

            [keys[idx], keys[newIdx]] = [keys[newIdx], keys[idx]];

            const reordered = {};
            keys.forEach(k => { reordered[k] = workoutTypes[k]; });
            workoutTypes = reordered;

            await saveWorkoutTypes();
            renderWorkoutSelector();
            renderSettings();
        }

        async function moveExercise(name, direction) {
            const workout = workoutTypes[currentWorkoutId];
            const exercises = workout.exercises;
            const idx = exercises.findIndex(ex => ex.name === name);
            if (idx === -1) return;
            const newIdx = direction === 'up' ? idx - 1 : idx + 1;
            if (newIdx < 0 || newIdx >= exercises.length) return;

            [exercises[idx], exercises[newIdx]] = [exercises[newIdx], exercises[idx]];

            await saveWorkoutTypes();
            renderExercises();
        }

        function syncInputValues() {
            const container = document.getElementById('exercisesContainer');
            if (!container) return;
            container.querySelectorAll('.exercise-card').forEach(card => {
                const nameEl = card.querySelector('.exercise-name');
                if (!nameEl) return;
                const exerciseName = nameEl.textContent.trim();
                if (!currentWorkout[exerciseName]) return;
                card.querySelectorAll('.set-row').forEach((row, setIdx) => {
                    const [weightInput, repsInput] = row.querySelectorAll('input.input-field');
                    if (!currentWorkout[exerciseName][setIdx]) return;
                    if (weightInput) currentWorkout[exerciseName][setIdx].weight = weightInput.value;
                    if (repsInput) currentWorkout[exerciseName][setIdx].reps = repsInput.value;
                });
            });
        }

        function renderExercises() {
            syncInputValues();
            const container = document.getElementById('exercisesContainer');
            container.innerHTML = '';

            const workout = workoutTypes[currentWorkoutId];
            if (!workout || !workout.exercises || !workout.exercises.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏋️</div>
                        <div>No exercises yet.<br>Add your first exercise!</div>
                    </div>
                `;
                return;
            }

            workout.exercises.forEach((exercise, exerciseIndex) => {
                const sets = currentWorkout[exercise.name] || [];
                const currentVolume = sets.filter(s => s.completed).reduce((sum, set) => {
                    return sum + (parseFloat(set.weight) || 0) * (parseInt(set.reps) || 0);
                }, 0);
                const exerciseRestTime = exercise.restTime || workoutTypes[currentWorkoutId].restTime || REST_TIME;

                const lastSets = lastSessionData && lastSessionData.workout && lastSessionData.workout[exercise.name];
                const lastSessionVolume = lastSets ? lastSets.filter(s => s.completed).reduce((sum, set) => {
                    return sum + (parseFloat(set.weight) || 0) * (parseInt(set.reps) || 0);
                }, 0) : 0;

                let volumeDisplayHtml = '';
                if (lastSessionVolume > 0 || currentVolume > 0) {
                    const prevPart = lastSessionVolume > 0
                        ? `<div style="color:#888;font-size:11px;font-weight:normal">prev ${lastSessionVolume}kg</div>`
                        : '';
                    let currentPart = '';
                    if (currentVolume > 0) {
                        const color = lastSessionVolume > 0
                            ? (currentVolume >= lastSessionVolume ? '#22c55e' : '#ef4444')
                            : '#22c55e';
                        const arrow = lastSessionVolume > 0
                            ? (currentVolume > lastSessionVolume ? ' ↑' : currentVolume < lastSessionVolume ? ' ↓' : '')
                            : '';
                        currentPart = `<div style="color:${color}">${currentVolume}kg${arrow}</div>`;
                    }
                    volumeDisplayHtml = prevPart + currentPart;
                }

                const lastSessionHtml = lastSets && lastSets.length > 0
                    ? `<div class="last-session">
                        <span class="last-session-label">Prev session:</span>
                        ${lastSets.map(set => `<span class="last-session-set ${set.completed ? 'completed' : 'incomplete'}">${set.completed ? '✓' : '–'} ${escapeHtml(set.weight)}kg×${escapeHtml(set.reps)}</span>`).join('')}
                    </div>`
                    : '';

                const card = document.createElement('div');
                card.className = 'exercise-card';
                card.innerHTML = `
                    <div class="exercise-header">
                        <div class="exercise-name">${exercise.name}</div>
                        <div class="exercise-total">${volumeDisplayHtml}</div>
                        <button class="icon-btn" onclick="moveExercise('${exercise.name}', 'up')" ${exerciseIndex === 0 ? 'disabled' : ''} style="padding:4px 8px;font-size:11px;">▲</button>
                        <button class="icon-btn" onclick="moveExercise('${exercise.name}', 'down')" ${exerciseIndex === workout.exercises.length - 1 ? 'disabled' : ''} style="padding:4px 8px;font-size:11px;margin-right:6px;">▼</button>
                        <button class="rest-time-badge" onclick="openEditExercise('${exercise.name}')" aria-label="Edit rest time for ${exercise.name}">⏱️ ${exerciseRestTime}s</button>
                        <button class="delete-exercise-btn" onclick="deleteExercise('${exercise.name}')">✕</button>
                    </div>
                    ${lastSessionHtml}
                    <div class="sets-container">
                        ${sets.map((set, index) => {
                            // Only compare against completed sets from the previous session
                            const prevSet = lastSets && lastSets[index] && lastSets[index].completed ? lastSets[index] : null;
                            const prevWeight = prevSet ? parseFloat(prevSet.weight) : null;
                            const currWeight = parseFloat(set.weight);
                            let weightColor = '#fff';
                            if (prevWeight !== null && !isNaN(currWeight) && currWeight > 0) {
                                weightColor = currWeight > prevWeight ? '#22c55e' : '#ef4444';
                            }
                            return `
                            <div class="set-row">
                                <div class="set-number">Set ${index + 1}</div>
                                <div class="input-group">
                                    <label class="input-label">Weight (kg)</label>
                                    <input 
                                        type="number" 
                                        class="input-field" 
                                        value="${set.weight}"
                                        style="color: ${weightColor}"
                                        onchange="updateSet('${exercise.name}', ${index}, 'weight', this.value)"
                                        step="0.5"
                                        inputmode="decimal"
                                    >
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Reps</label>
                                    <input 
                                        type="number" 
                                        class="input-field" 
                                        value="${set.reps}"
                                        onchange="updateSet('${exercise.name}', ${index}, 'reps', this.value)"
                                        inputmode="numeric"
                                    >
                                </div>
                                <button 
                                    class="check-btn ${set.completed ? 'completed' : ''}"
                                    onclick="toggleSetComplete('${exercise.name}', ${index})"
                                >
                                    ${set.completed ? '✓' : ''}
                                </button>
                            </div>
                        `}).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function saveExercise() {
            const name = document.getElementById('exerciseNameInput').value.trim();
            const sets = Math.min(10, Math.max(1, parseInt(document.getElementById('exerciseSetsInput').value) || 3));
            const restTimeRaw = parseInt(document.getElementById('exerciseRestTimeInput').value);
            const restTime = isNaN(restTimeRaw) ? null : Math.min(600, Math.max(10, restTimeRaw));

            if (!name) {
                alert('Please enter an exercise name');
                return;
            }

            const workout = workoutTypes[currentWorkoutId];

            if (editingExerciseName) {
                // Edit existing exercise
                const exercise = workout.exercises.find(ex => ex.name === editingExerciseName);
                if (exercise) {
                    exercise.sets = sets;
                    if (restTime !== null) {
                        exercise.restTime = restTime;
                    } else {
                        delete exercise.restTime;
                    }
                    // Adjust currentWorkout sets to new count
                    const prevSets = currentWorkout[editingExerciseName] || [];
                    const newSets = [];
                    for (let i = 0; i < sets; i++) {
                        if (i < prevSets.length) {
                            newSets.push(prevSets[i]);
                        } else {
                            const lastSet = prevSets[prevSets.length - 1];
                            newSets.push({ weight: lastSet?.weight || '', reps: lastSet?.reps || '', completed: false });
                        }
                    }
                    currentWorkout[editingExerciseName] = newSets;
                }
            } else {
                // Add new exercise
                if (workout.exercises.some(ex => ex.name === name)) {
                    alert('This exercise already exists in this workout');
                    return;
                }
                const newExercise = { name, sets };
                if (restTime !== null) newExercise.restTime = restTime;
                workout.exercises.push(newExercise);
                const prevSets = lastSessionData && lastSessionData.workout && lastSessionData.workout[name];
                if (prevSets && prevSets.length > 0) {
                    const newSets = [];
                    for (let i = 0; i < sets; i++) {
                        const ref = i < prevSets.length ? prevSets[i] : prevSets[prevSets.length - 1];
                        newSets.push({ weight: ref.weight, reps: ref.reps, completed: false });
                    }
                    currentWorkout[name] = newSets;
                } else {
                    currentWorkout[name] = Array(sets).fill().map(() => ({
                        weight: '', reps: '', completed: false
                    }));
                }
            }

            await saveWorkoutTypes();
            renderExercises();
            closeAddExercise();
        }

        async function deleteExercise(name) {
            if (confirm(`Remove "${name}" from this workout?`)) {
                const workout = workoutTypes[currentWorkoutId];
                workout.exercises = workout.exercises.filter(ex => ex.name !== name);
                delete currentWorkout[name];
                await saveWorkoutTypes();
                renderExercises();
            }
        }

        function updateSet(exercise, setIndex, field, value) {
            currentWorkout[exercise][setIndex][field] = value;
            renderExercises();
        }

        function toggleSetComplete(exercise, setIndex) {
            const set = currentWorkout[exercise][setIndex];
            set.completed = !set.completed;
            
            if (set.completed && set.weight && set.reps) {
                startTimer(exercise);
            }
            
            renderExercises();
        }

        function startTimer(exerciseName) {
            const exercise = exerciseName && workoutTypes[currentWorkoutId].exercises.find(ex => ex.name === exerciseName);
            timeRemaining = (exercise && exercise.restTime) || workoutTypes[currentWorkoutId].restTime || REST_TIME;
            timerRunning = true;
            document.getElementById('timerModal').classList.add('active');
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (timerRunning) {
                    timeRemaining--;
                    updateTimerDisplay();
                    
                    if (timeRemaining <= 0) {
                        playSound();
                        skipTimer();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timerDisplay').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            timerRunning = !timerRunning;
            document.getElementById('timerActionBtn').textContent = timerRunning ? 'Pause' : 'Resume';
        }

        function skipTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('timerModal').classList.remove('active');
            document.getElementById('timerActionBtn').textContent = 'Pause';
        }

        function playSound() {
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }
        }

        async function saveWorkout() {
            try {
                syncInputValues();
                updateSyncStatus('syncing', '⏳ Saving...');
                
                const userId = window.currentUser.uid;
                const workoutId = new Date().getTime().toString();
                
                const workoutData = {
                    date: new Date().toISOString(),
                    workoutId: currentWorkoutId,
                    workoutName: workoutTypes[currentWorkoutId].name,
                    workout: JSON.parse(JSON.stringify(currentWorkout))
                };
                
                const workoutRef = window.firebaseModules.doc(
                    window.firebaseDb, 
                    `users/${userId}/workouts/${workoutId}`
                );
                
                await window.firebaseModules.setDoc(workoutRef, workoutData);
                
                updateSyncStatus('', '☁️ Synced');
                alert('Workout saved! 💪');
                
                await renderHistory();
                await loadCurrentWorkout();
                renderExercises();
            } catch (error) {
                console.error('Error saving workout:', error);
                updateSyncStatus('error', '⚠️ Save failed');
                alert('Failed to save workout. Please try again.');
            }
        }

        async function renderHistory() {
            const container = document.getElementById('historyContainer');
            
            try {
                const userId = window.currentUser.uid;
                const workoutsRef = window.firebaseModules.collection(window.firebaseDb, `users/${userId}/workouts`);
                const querySnapshot = await window.firebaseModules.getDocs(workoutsRef);
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div>No workout history yet.<br>Complete your first session!</div></div>';
                    return;
                }
                
                const workouts = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    workouts.push({ ...data, dateObj: new Date(data.date) });
                });
                
                workouts.sort((a, b) => b.dateObj - a.dateObj);
                
                let historyHTML = '';
                workouts.forEach(entry => {
                    const dateStr = entry.dateObj.toLocaleDateString('en-GB', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
                    const exercises = Object.keys(entry.workout).map(name => ({ name }));
                    
                    historyHTML += `<div class="history-item"><div class="history-date">${dateStr}</div><div class="history-workout-name">${entry.workoutName}</div><div class="history-exercises">`;
                    
                    exercises.forEach(exercise => {
                        const sets = entry.workout[exercise.name] || [];
                        const count = sets.length;
                        const totalVolume = sets.reduce((sum, set) => sum + (parseFloat(set.weight) || 0) * (parseInt(set.reps) || 0), 0);
                        historyHTML += `<div class="history-exercise"><span>${exercise.name}</span><span>${count} sets • ${totalVolume} kg</span></div>`;
                    });
                    
                    historyHTML += '</div></div>';
                });
                
                container.innerHTML = historyHTML;
            } catch (error) {
                console.error('Error loading history:', error);
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div>Failed to load history</div></div>';
            }
        }

        function renderSettings() {
            const container = document.getElementById('workoutsList');
            container.innerHTML = '';

            const workoutKeys = Object.keys(workoutTypes);
            workoutKeys.forEach((id, index) => {
                const workout = workoutTypes[id];
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <div>
                        <div style="color: #fff; font-size: 16px;">${workout.emoji || '💪'} ${workout.name}</div>
                        <div style="color: #888; font-size: 14px;">${workout.exercises.length} exercises • ${workout.restTime || REST_TIME}s rest</div>
                    </div>
                    <div class="btn-group">
                        <button class="icon-btn" onclick="moveWorkout('${id}', 'up')" ${index === 0 ? 'disabled' : ''}>▲</button>
                        <button class="icon-btn" onclick="moveWorkout('${id}', 'down')" ${index === workoutKeys.length - 1 ? 'disabled' : ''}>▼</button>
                        <button class="icon-btn" onclick="openWorkoutModal('${id}')">Edit</button>
                        <button class="icon-btn danger-btn" onclick="deleteWorkout('${id}')">Delete</button>
                    </div>
                `;
                container.appendChild(item);
            });

            const versionEl = document.getElementById('appVersionDisplay');
            if (versionEl) versionEl.textContent = `Version ${APP_VERSION}`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'workout') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('workoutTab').classList.add('active');
            } else if (tab === 'history') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('historyTab').classList.add('active');
            } else if (tab === 'settings') {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('settingsTab').classList.add('active');
            } else if (tab === 'charts') {
                document.querySelectorAll('.tab')[3].classList.add('active');
                document.getElementById('chartsTab').classList.add('active');
                loadCharts();
            }
        }

        // Custom chart drawing functions
        function drawBarChart(canvas, data, labels, color) {
            const ctx = canvas.getContext('2d');
            const padding = 40;
            const width = canvas.width - padding * 2;
            const height = canvas.height - padding * 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!data || data.length === 0) return;
            const maxValue = Math.max(...data, 1);
            const barWidth = width / data.length * 0.8;
            const gap = width / data.length * 0.2;
            data.forEach((value, i) => {
                const barHeight = (value / maxValue) * height;
                const x = padding + i * (barWidth + gap);
                const y = canvas.height - padding - barHeight;
                ctx.fillStyle = color || '#667eea';
                ctx.fillRect(x, y, barWidth, barHeight);
                ctx.fillStyle = '#888';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i] || '', x + barWidth / 2, canvas.height - padding + 20);
                ctx.fillStyle = '#fff';
                ctx.fillText(value, x + barWidth / 2, y - 5);
            });
            ctx.strokeStyle = '#2a2a3e';
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, canvas.height - padding);
            ctx.lineTo(canvas.width - padding, canvas.height - padding);
            ctx.stroke();
        }

        function drawLineChart(canvas, data, labels, color) {
            const ctx = canvas.getContext('2d');
            const padding = 40;
            const width = canvas.width - padding * 2;
            const height = canvas.height - padding * 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!data || data.length === 0) return;
            const maxValue = Math.max(...data, 1);
            const stepX = width / (data.length - 1 || 1);
            ctx.strokeStyle = color || '#764ba2';
            ctx.lineWidth = 3;
            ctx.beginPath();
            data.forEach((value, i) => {
                const x = padding + i * stepX;
                const y = canvas.height - padding - (value / maxValue) * height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            data.forEach((value, i) => {
                const x = padding + i * stepX;
                const y = canvas.height - padding - (value / maxValue) * height;
                ctx.fillStyle = color || '#764ba2';
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#888';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i] || '', x, canvas.height - padding + 20);
            });
            ctx.strokeStyle = '#2a2a3e';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, canvas.height - padding);
            ctx.lineTo(canvas.width - padding, canvas.height - padding);
            ctx.stroke();
        }

        function renderWorkoutSummary(workouts) {
            const container = document.getElementById('workoutSummaryContainer');
            if (!workouts.length) {
                container.innerHTML = '';
                return;
            }

            const summary = {};
            // Sort descending by date so recentSessions[0] is the most recent
            const sorted = [...workouts].sort((a, b) => new Date(b.date) - new Date(a.date));
            sorted.forEach(w => {
                const id = w.workoutId || 'unknown';
                const name = w.workoutName || id;
                if (!summary[id]) {
                    summary[id] = { name, sessions: 0, recentSessions: [], lastDate: null };
                }
                summary[id].sessions++;
                let vol = 0;
                if (w.workout) {
                    Object.values(w.workout).forEach(sets => {
                        sets.forEach(set => {
                            vol += (parseFloat(set.weight) || 0) * (parseFloat(set.reps) || 0);
                        });
                    });
                }
                if (summary[id].recentSessions.length < 2) {
                    summary[id].recentSessions.push({ vol, date: w.date });
                }
                const date = w.date ? new Date(w.date) : null;
                if (date && !isNaN(date) && (!summary[id].lastDate || date > summary[id].lastDate)) {
                    summary[id].lastDate = date;
                }
            });

            // Calculate current in-progress workout volume (completed sets only)
            let currentVol = 0;
            if (currentWorkout) {
                Object.values(currentWorkout).forEach(sets => {
                    sets.filter(s => s.completed).forEach(set => {
                        currentVol += (parseFloat(set.weight) || 0) * (parseFloat(set.reps) || 0);
                    });
                });
            }

            let html = '<div class="chart-section"><h3>Workout Summary</h3><div class="summary-grid">';
            Object.entries(summary).sort((a, b) => b[1].sessions - a[1].sessions).forEach(([id, s]) => {
                const dateStr = s.lastDate
                    ? s.lastDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
                    : '—';

                // Show last 2 sessions (oldest first) then current
                let volHtml = '';
                [...s.recentSessions].reverse().forEach(session => {
                    const d = new Date(session.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                    volHtml += `<div class="summary-stat"><span>${d}</span><span class="summary-value">${Math.round(session.vol).toLocaleString()} kg</span></div>`;
                });
                if (id === currentWorkoutId && currentVol > 0) {
                    const lastVol = s.recentSessions.length > 0 ? s.recentSessions[0].vol : null;
                    const color = lastVol !== null ? (currentVol >= lastVol ? '#22c55e' : '#ef4444') : '#22c55e';
                    const arrow = lastVol !== null ? (currentVol > lastVol ? ' ↑' : currentVol < lastVol ? ' ↓' : '') : '';
                    volHtml += `<div class="summary-stat"><span>Current</span><span class="summary-value" style="color:${color}">${Math.round(currentVol).toLocaleString()} kg${arrow}</span></div>`;
                }

                html += `
                    <div class="summary-card">
                        <div class="summary-name">${s.name}</div>
                        <div class="summary-stat"><span>Sessions</span><span class="summary-value">${s.sessions}</span></div>
                        ${volHtml}
                        <div class="summary-stat"><span>Last Session</span><span class="summary-value">${dateStr}</span></div>
                    </div>`;
            });
            html += '</div></div>';
            container.innerHTML = html;
        }

        async function loadCharts() {
            try {
                const workouts = await loadAllWorkouts();
                renderWorkoutSummary(workouts);
                populateExerciseSelect(workouts);
                renderFrequencyChart(workouts);
                renderVolumeChart(workouts);
                const selectedExercise = document.getElementById('exerciseSelect').value;
                if (selectedExercise) updateExerciseChart();
            } catch (error) {
                console.error('Error loading charts:', error);
            }
        }

        async function loadAllWorkouts() {
            const userId = window.firebaseAuth.currentUser?.uid;
            if (!userId) return [];
            const workoutsRef = window.firebaseModules.collection(window.firebaseDb, `users/${userId}/workouts`);
            const querySnapshot = await window.firebaseModules.getDocs(workoutsRef);
            const workouts = [];
            querySnapshot.forEach(doc => workouts.push({ id: doc.id, ...doc.data() }));
            return workouts;
        }

        function populateExerciseSelect(workouts) {
            const exerciseSet = new Set();
            workouts.forEach(workout => {
                if (workout.workout) Object.keys(workout.workout).forEach(name => exerciseSet.add(name));
            });
            const select = document.getElementById('exerciseSelect');
            select.innerHTML = '<option value="">Select Exercise...</option>';
            Array.from(exerciseSet).sort().forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });
        }

        function renderFrequencyChart(workouts) {
            const canvas = document.getElementById('frequencyChart');
            canvas.width = canvas.offsetWidth;
            canvas.height = 300;
            const weekCounts = {};
            workouts.forEach(workout => {
                const date = new Date(workout.date);
                const weekStart = new Date(date);
                weekStart.setDate(date.getDate() - date.getDay());
                const weekKey = weekStart.toISOString().split('T')[0];
                weekCounts[weekKey] = (weekCounts[weekKey] || 0) + 1;
            });
            const sortedWeeks = Object.keys(weekCounts).sort().slice(-12);
            const counts = sortedWeeks.map(week => weekCounts[week]);
            const labels = sortedWeeks.map(week => new Date(week).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }));
            drawBarChart(canvas, counts, labels, '#667eea');
        }

        async function updateExerciseChart() {
            const exerciseName = document.getElementById('exerciseSelect').value;
            if (!exerciseName) return;
            const workouts = await loadAllWorkouts();
            const dateMap = {};
            workouts.reverse().forEach(workout => {
                if (workout.workout && workout.workout[exerciseName]) {
                    const sets = workout.workout[exerciseName];
                    let maxWeight = 0;
                    sets.forEach(set => {
                        const weight = parseFloat(set.weight) || 0;
                        if (weight > maxWeight) maxWeight = weight;
                    });
                    const dateKey = new Date(workout.date).toISOString().split('T')[0];
                    if (!dateMap[dateKey] || maxWeight > dateMap[dateKey]) dateMap[dateKey] = maxWeight;
                }
            });
            const canvas = document.getElementById('exerciseChart');
            canvas.width = canvas.offsetWidth;
            canvas.height = 300;
            const sortedDates = Object.keys(dateMap).sort().slice(-20);
            const weights = sortedDates.map(date => dateMap[date]);
            const labels = sortedDates.map(date => new Date(date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }));
            drawLineChart(canvas, weights, labels, '#764ba2');
        }

        function renderVolumeChart(workouts) {
            const canvas = document.getElementById('volumeChart');
            canvas.width = canvas.offsetWidth;
            canvas.height = 300;
            const volumeData = workouts.slice(0, 20).reverse().map(workout => {
                let totalVolume = 0;
                if (workout.workout) {
                    Object.values(workout.workout).forEach(exercise => {
                        exercise.forEach(set => {
                            totalVolume += (parseFloat(set.weight) || 0) * (parseFloat(set.reps) || 0);
                        });
                    });
                }
                return { date: new Date(workout.date), volume: totalVolume };
            });
            const labels = volumeData.map(d => d.date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }));
            const volumes = volumeData.map(d => d.volume);
            drawBarChart(canvas, volumes, labels, '#764ba2');
        }

        // Expose functions globally for onclick handlers
        window.switchTab = switchTab;
        window.openWorkoutManager = openWorkoutManager;
        window.closeWorkoutManager = closeWorkoutManager;
        window.openWorkoutModal = openWorkoutModal;
        window.closeWorkoutModal = closeWorkoutModal;
        window.saveWorkoutType = saveWorkoutType;
        window.deleteWorkout = deleteWorkout;
        window.moveWorkout = moveWorkout;
        window.openAddExercise = openAddExercise;
        window.openEditExercise = openEditExercise;
        window.closeAddExercise = closeAddExercise;
        window.saveExercise = saveExercise;
        window.deleteExercise = deleteExercise;
        window.updateSet = updateSet;
        window.toggleSetComplete = toggleSetComplete;
        window.saveWorkout = saveWorkout;
        window.skipTimer = skipTimer;
        window.toggleTimer = toggleTimer;
        window.updateExerciseChart = updateExerciseChart;
        window.handleAuth = handleAuth;
        window.toggleAuthMode = toggleAuthMode;
        window.handleLogout = handleLogout;
    </script>

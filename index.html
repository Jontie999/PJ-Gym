<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Gym Tracker v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        .app-container {
            max-width: 428px;
            margin: 0 auto;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2a2a3e;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .header .subtitle {
            color: #888;
            font-size: 14px;
        }

        .sync-status {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            font-size: 12px;
            color: #667eea;
        }

        .sync-status.syncing {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.2);
        }

        .sync-status.error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.2);
        }

        .auth-container {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin: 50px auto;
            max-width: 400px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .auth-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-toggle {
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
        }

        .workout-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .workout-chip {
            padding: 10px 20px;
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .workout-chip.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .workout-chip.add {
            border-style: dashed;
            color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .exercise-card {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .exercise-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }

        .exercise-total {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-right: 10px;
        }

        .delete-exercise-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .sets-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 60px;
            gap: 10px;
            align-items: center;
        }

        .set-number {
            color: #888;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.6);
        }

        .check-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .check-btn.completed {
            background: #667eea;
            color: white;
        }

        .add-exercise-btn {
            width: 100%;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border: 2px dashed rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .save-btn {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom));
            right: 20px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 25px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 100;
        }

        .save-btn:active {
            transform: scale(0.95);
        }

        /* Modal Styles */
        .timer-modal, .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .timer-modal.active, .modal-overlay.active {
            display: flex;
        }

        .timer-content {
            text-align: center;
            padding: 40px;
        }

        .timer-display {
            font-size: 80px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .timer-controls, .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .timer-btn, .modal-btn {
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .timer-btn.primary, .modal-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .timer-btn.secondary, .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            flex: 1;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .charts-container {
            padding: 10px 0;
        }

        .chart-section {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .chart-section h3 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .chart-section canvas {
            width: 100%;
            max-height: 300px;
        }

        .exercise-select {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            color: #fff;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .settings-section {
            background: rgba(26, 26, 46, 0.6);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .settings-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #667eea;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icon-btn {
            padding: 8px 12px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 6px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
        }

        .danger-btn {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="authScreen" class="auth-container">
        <div class="auth-title">💪 Welcome to Gym Tracker</div>
        <div class="auth-subtitle">Sign in to sync your workouts</div>
        
        <input type="email" id="emailInput" class="auth-input" placeholder="Email" autocomplete="email">
        <input type="password" id="passwordInput" class="auth-input" placeholder="Password" autocomplete="current-password">
        
        <button class="auth-btn" id="authSubmitBtn">
            <span id="authBtnText">Sign In</span>
        </button>
        
        <div class="auth-toggle" id="authToggle">
            <span id="authToggleText">Don't have an account? Sign up</span>
        </div>
    </div>

    <div id="appScreen" class="app-container" style="display: none;">
        <div class="header">
            <h1 id="headerLogo">💪 GYM TRACKER</h1>
            <div class="subtitle" id="currentDate"></div>
            <div class="sync-status" id="syncStatus">☁️ Synced</div>
        </div>

        <div class="workout-selector" id="workoutSelector"></div>

        <div class="tabs">
            <button class="tab active" data-tab="workout">Workout</button>
            <button class="tab" data-tab="history">History</button>
            <button class="tab" data-tab="settings">Settings</button>
            <button class="tab" data-tab="charts">📊 Charts</button>
        </div>

        <div id="workoutTab" class="tab-content active">
            <div id="exercisesContainer"></div>
            <button class="add-exercise-btn" id="addExerciseTrigger">+ Add Exercise</button>
        </div>

        <div id="historyTab" class="tab-content">
            <div id="historyContainer"></div>
        </div>

        <div id="chartsTab" class="tab-content">
            <div class="charts-container">
                <div class="chart-section">
                    <h3>Workout Frequency</h3>
                    <canvas id="frequencyChart"></canvas>
                </div>
                <div class="chart-section">
                    <h3>Exercise Progress</h3>
                    <select id="exerciseSelect" class="exercise-select">
                        <option value="">Select Exercise...</option>
                    </select>
                    <canvas id="exerciseChart"></canvas>
                </div>
                <div class="chart-section">
                    <h3>Total Volume by Workout</h3>
                    <canvas id="volumeChart"></canvas>
                </div>
            </div>
        </div>

        <div id="settingsTab" class="tab-content">
            <div class="settings-section">
                <div class="settings-title">Workouts</div>
                <div id="workoutsList"></div>
            </div>
            <div class="settings-section">
                <div class="settings-title">Account</div>
                <div class="settings-item">
                    <div>
                        <div style="color: #fff; font-size: 16px;">Email</div>
                        <div style="color: #888; font-size: 14px;" id="userEmail"></div>
                    </div>
                    <button class="icon-btn danger-btn" id="signOutBtn">Sign Out</button>
                </div>
            </div>
        </div>

        <button class="save-btn" id="saveWorkoutBtn">Save Workout</button>
    </div>

    <div class="timer-modal" id="timerModal">
        <div class="timer-content">
            <div class="timer-display" id="timerDisplay">90</div>
            <div class="timer-controls">
                <button class="timer-btn secondary" id="skipTimerBtn">Skip</button>
                <button class="timer-btn primary" id="timerActionBtn">Pause</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="workoutModal">
        <div class="modal">
            <div class="modal-title" id="workoutModalTitle">New Workout</div>
            <input type="text" id="workoutNameInput" class="modal-input" placeholder="Workout name">
            <input type="text" id="workoutEmojiInput" class="modal-input" placeholder="Emoji (optional)" maxlength="2">
            <div class="modal-buttons">
                <button class="modal-btn secondary" id="closeWorkoutModalBtn">Cancel</button>
                <button class="modal-btn primary" id="saveWorkoutTypeBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addExerciseModal">
        <div class="modal">
            <div class="modal-title">Add Exercise</div>
            <input type="text" id="exerciseNameInput" class="modal-input" placeholder="Exercise name">
            <input type="number" id="exerciseSetsInput" class="modal-input" placeholder="Number of sets" value="3">
            <div class="modal-buttons">
                <button class="modal-btn secondary" id="closeAddExerciseBtn">Cancel</button>
                <button class="modal-btn primary" id="addExerciseBtn">Add</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, limit, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDUVo0BGNGk5mhb-NMPKf1FxdLSij7ssms",
            authDomain: "pj-gym-90c42.firebaseapp.com",
            projectId: "pj-gym-90c42",
            storageBucket: "pj-gym-90c42.firebasestorage.app",
            messagingSenderId: "1070541610883",
            appId: "1:1070541610883:web:a3d5c9107accf23396a0b6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global State
        let currentUser = null;
        let isSignUpMode = false;
        let workoutTypes = {};
        let currentWorkoutId = 'push';
        let currentWorkout = {};
        let timerInterval = null;
        let timeRemaining = 90;
        let timerRunning = false;
        let editingWorkoutId = null;

        const DEFAULT_WORKOUTS = {
            'push': {
                name: 'Push',
                emoji: '💪',
                exercises: [
                    { name: 'Bench Press', sets: 3 },
                    { name: 'Shoulder Press', sets: 3 }
                ]
            }
        };

        // UI Helpers
        const showAuth = () => {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('appScreen').style.display = 'none';
        };

        const showApp = () => {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
        };

        // Auth Logic
        async function handleAuth() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            if (!email || !password) return alert('Enter credentials');

            try {
                if (isSignUpMode) await createUserWithEmailAndPassword(auth, email, password);
                else await signInWithEmailAndPassword(auth, email, password);
            } catch (e) { alert(e.message); }
        }

        // Workout Logic
        async function loadData() {
            updateDate();
            const userId = currentUser.uid;
            const typesRef = doc(db, `users/${userId}/settings/workoutTypes`);
            const snap = await getDoc(typesRef);
            
            workoutTypes = snap.exists() ? snap.data().types : DEFAULT_WORKOUTS;
            if (!snap.exists()) await setDoc(typesRef, { types: workoutTypes });
            
            currentWorkoutId = Object.keys(workoutTypes)[0];
            await loadCurrentWorkout();
            renderAll();
        }

        async function loadCurrentWorkout() {
            const userId = currentUser.uid;
            const workout = workoutTypes[currentWorkoutId];
            currentWorkout = {};
            
            if (workout && workout.exercises) {
                workout.exercises.forEach(ex => {
                    currentWorkout[ex.name] = Array(ex.sets).fill().map(() => ({
                        weight: '', reps: '', completed: false
                    }));
                });
            }
        }

        function renderAll() {
            renderWorkoutSelector();
            renderExercises();
            renderSettings();
        }

        function renderWorkoutSelector() {
            const container = document.getElementById('workoutSelector');
            container.innerHTML = '';
            Object.keys(workoutTypes).forEach(id => {
                const chip = document.createElement('div');
                chip.className = `workout-chip ${id === currentWorkoutId ? 'active' : ''}`;
                chip.textContent = `${workoutTypes[id].emoji || '💪'} ${workoutTypes[id].name}`;
                chip.onclick = async () => {
                    currentWorkoutId = id;
                    await loadCurrentWorkout();
                    renderAll();
                };
                container.appendChild(chip);
            });
        }

        function renderExercises() {
            const container = document.getElementById('exercisesContainer');
            container.innerHTML = '';
            const workout = workoutTypes[currentWorkoutId];
            
            if (!workout || !workout.exercises || workout.exercises.length === 0) {
                container.innerHTML = '<div class="empty-state">No exercises found.</div>';
                return;
            }

            workout.exercises.forEach(ex => {
                const card = document.createElement('div');
                card.className = 'exercise-card';
                card.innerHTML = `<div class="exercise-header"><div class="exercise-name">${ex.name}</div></div>`;
                
                const setsCont = document.createElement('div');
                setsCont.className = 'sets-container';
                
                (currentWorkout[ex.name] || []).forEach((set, idx) => {
                    const row = document.createElement('div');
                    row.className = 'set-row';
                    row.innerHTML = `
                        <div class="set-number">${idx + 1}</div>
                        <div class="input-group"><input type="number" class="input-field" placeholder="kg" value="${set.weight}"></div>
                        <div class="input-group"><input type="number" class="input-field" placeholder="reps" value="${set.reps}"></div>
                        <button class="check-btn ${set.completed ? 'completed' : ''}">${set.completed ? '✓' : ''}</button>
                    `;
                    
                    const inputs = row.querySelectorAll('input');
                    inputs[0].oninput = (e) => set.weight = e.target.value;
                    inputs[1].oninput = (e) => set.reps = e.target.value;
                    row.querySelector('.check-btn').onclick = () => {
                        set.completed = !set.completed;
                        if (set.completed) startTimer();
                        renderExercises();
                    };
                    
                    setsCont.appendChild(row);
                });
                card.appendChild(setsCont);
                container.appendChild(card);
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeRemaining = 90;
            timerRunning = true;
            document.getElementById('timerModal').classList.add('active');
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (timerRunning) {
                    timeRemaining--;
                    updateTimerDisplay();
                    if (timeRemaining <= 0) {
                        clearInterval(timerInterval);
                        document.getElementById('timerModal').classList.remove('active');
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }

        function updateDate() {
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        async function saveWorkout() {
            const userId = currentUser.uid;
            const logRef = doc(db, `users/${userId}/workouts/${Date.now()}`);
            await setDoc(logRef, {
                date: new Date().toISOString(),
                workoutId: currentWorkoutId,
                workoutName: workoutTypes[currentWorkoutId].name,
                workout: currentWorkout
            });
            alert('Workout Saved!');
        }

        function renderSettings() {
            const list = document.getElementById('workoutsList');
            list.innerHTML = '';
            Object.keys(workoutTypes).forEach(id => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `<div>${workoutTypes[id].name}</div><button class="icon-btn danger-btn">Delete</button>`;
                item.querySelector('button').onclick = async () => {
                    delete workoutTypes[id];
                    await setDoc(doc(db, `users/${currentUser.uid}/settings/workoutTypes`), { types: workoutTypes });
                    renderAll();
                };
                list.appendChild(item);
            });
        }

        // Attach to window for HTML access
        window.handleLogout = () => signOut(auth);

        // Event Listeners
        document.getElementById('authSubmitBtn').onclick = handleAuth;
        document.getElementById('authToggle').onclick = () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('authBtnText').textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
            document.getElementById('authToggleText').textContent = isSignUpMode ? 'Already have an account? Sign In' : "Don't have an account? Sign Up";
        };
        document.getElementById('signOutBtn').onclick = () => signOut(auth);
        document.getElementById('saveWorkoutBtn').onclick = saveWorkout;
        document.getElementById('skipTimerBtn').onclick = () => {
            clearInterval(timerInterval);
            document.getElementById('timerModal').classList.remove('active');
        };
        
        document.querySelectorAll('.tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${btn.dataset.tab}Tab`).classList.add('active');
            };
        });

        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                document.getElementById('userEmail').textContent = user.email;
                showApp();
                loadData();
            } else {
                showAuth();
            }
        });
    </script>
</body>
</html>
